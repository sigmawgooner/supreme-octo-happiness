<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Press 1-6</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        #media-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        
        #media {
            width: 100%;
            height: 100%;
            object-fit: contain;        /* Change to 'cover' if you want it to fill screen completely */
        }
        
        .overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 18px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="overlay" id="info">Press 1 to 6</div>
    
    <div id="media-container"></div>

    <script>
        const container = document.getElementById('media-container');
        const info = document.getElementById('info');

        function showMedia(num) {
            container.innerHTML = '';   // Clear previous media
            
            let element;
            
            switch(num) {
                case 1:
                    element = document.createElement('video');
                    element.src = '1.mp4';
                    element.autoplay = true;
                    element.loop = true;
                    element.muted = true;           // Muted so it plays automatically
                    break;
                    
                case 2:
                    element = document.createElement('img');
                    element.src = '2.gif';
                    break;
                    
                case 3:
                    element = document.createElement('img');
                    element.src = '3.gif';
                    break;
                    
                case 4:
                    element = document.createElement('img');
                    element.src = '4.jpg';
                    break;
                    
                case 5:
                    element = document.createElement('img');
                    element.src = '5.jpg';
                    break;
                    
                case 6:
                    element = document.createElement('img');
                    element.src = '6.jpg';
                    break;
            }
            
            if (element) {
                element.id = 'media';
                container.appendChild(element);
                info.textContent = `Media ${num}`;
            }
        }

        // Keyboard control
        document.addEventListener('keydown', (e) => {
            const num = parseInt(e.key);
            if (num >= 1 && num <= 6) {
                showMedia(num);
            }
        });

        // Optional: Click to show random
        document.addEventListener('click', () => {
            const random = Math.floor(Math.random() * 6) + 1;
            showMedia(random);
        });

        // Show first media automatically (optional)
        // showMedia(1);
    </script>
</body>
</html>
